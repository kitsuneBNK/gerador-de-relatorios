name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Baixa os arquivos do repositorio para o ambiente do GitHub Actions.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Prepara as configuracoes necessarias para publicar no GitHub Pages.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      # Como o projeto e estatico, a raiz do repositorio ja e o site pronto.
      - name: Upload static files
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      # Publica o pacote enviado no passo anterior.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
