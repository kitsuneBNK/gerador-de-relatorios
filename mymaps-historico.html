<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historico My Maps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link id="app-css" rel="stylesheet" href="./styles.css" />
  <script>
    (function () {
      const link = document.getElementById("app-css");
      if (!link) return;
      const isGh = location.hostname.endsWith("github.io");
      const repo = isGh ? location.pathname.split("/").filter(Boolean)[0] : "";
      const fallback = repo ? `/${repo}/styles.css` : "";
      link.addEventListener("error", () => {
        if (fallback && link.getAttribute("href") !== fallback) {
          link.setAttribute("href", fallback);
        }
      });
    })();
  </script>
</head>
<body class="min-h-screen text-slate-800 bg-slate-100">
  <main class="max-w-6xl mx-auto p-4 sm:p-6 md:p-10">
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-6">
      <div>
        <div class="inline-flex items-center gap-2 bg-white/80 border border-slate-200 rounded-full px-3 py-1 text-xs font-bold uppercase tracking-wide text-slate-600">
          My Maps
        </div>
        <h1 class="mt-3 text-2xl sm:text-3xl font-black text-slate-900 leading-tight">
          Historico de Copias
        </h1>
        <p class="mt-1 text-sm text-slate-600">
          Sempre que voce clicar em "Copiar apenas dados" no gerador, o registro sera salvo aqui.
        </p>
      </div>
      <div class="flex flex-wrap gap-2">
        <a href="./index.html" class="inline-flex items-center justify-center min-h-[44px] px-4 py-2 rounded-xl border border-slate-200 bg-white text-xs font-black uppercase tracking-wide hover:bg-slate-50">
          Voltar ao hub
        </a>
        <a href="./gerador-relatorio-vistoria.html" class="inline-flex items-center justify-center min-h-[44px] px-4 py-2 rounded-xl bg-[#004587] text-white text-xs font-black uppercase tracking-wide hover:bg-[#003a70]">
          Abrir gerador
        </a>
      </div>
    </header>

    <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-4 sm:p-6">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="text-xs font-bold text-slate-500 uppercase">Total de registros: <span id="count">0</span></div>
        <button id="clear-all" class="inline-flex items-center justify-center min-h-[40px] px-4 py-2 rounded-lg bg-red-50 text-red-600 text-xs font-black uppercase tracking-wide border border-red-100 hover:bg-red-100">
          Limpar tudo
        </button>
      </div>

      <div id="empty-state" class="hidden text-center py-10 text-slate-500 text-sm">
        Nenhum registro salvo ainda.
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-xs">
          <thead class="bg-slate-50 text-slate-600 uppercase tracking-wide">
            <tr>
              <th class="px-3 py-2">Assunto</th>
              <th class="px-3 py-2">Categoria</th>
              <th class="px-3 py-2">Processo</th>
              <th class="px-3 py-2">Local</th>
              <th class="px-3 py-2">Data</th>
              <th class="px-3 py-2">Coordenadas</th>
              <th class="px-3 py-2">Copiado em</th>
              <th class="px-3 py-2 text-right">Acoes</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </section>
  </main>
  <button id="theme-toggle" class="theme-toggle no-print-area" type="button" aria-label="Alternar tema">Modo escuro</button>

  <script>
    const STORAGE_KEY = "mymaps_history_v1";
    const tableBody = document.getElementById("table-body");
    const emptyState = document.getElementById("empty-state");
    const countEl = document.getElementById("count");

    const formatDateBR = (iso) => {
      if (!iso) return "";
      if (iso.includes("/")) return iso;
      const parts = iso.split("-");
      if (parts.length !== 3) return iso;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    };

    const formatDateTime = (iso) => {
      if (!iso) return "";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return iso;
      const pad = (n) => String(n).padStart(2, "0");
      return `${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${date.getFullYear()} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    };

    const loadData = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    };

    const saveData = (rows) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      } catch {}
    };

    const render = () => {
      const rows = loadData();
      countEl.textContent = rows.length;
      tableBody.innerHTML = "";
      if (!rows.length) {
        emptyState.classList.remove("hidden");
        return;
      }
      emptyState.classList.add("hidden");

      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-slate-50";

        const cells = [
          row.assunto || "-",
          row.categoria || "-",
          row.numeroProcesso || "-",
          row.local || "-",
          formatDateBR(row.data),
          row.coordenadas || "-",
          formatDateTime(row.createdAt),
        ];

        cells.forEach((text) => {
          const td = document.createElement("td");
          td.className = "px-3 py-2 text-slate-700 align-top";
          td.textContent = text;
          tr.appendChild(td);
        });

        const tdActions = document.createElement("td");
        tdActions.className = "px-3 py-2 text-right";
        const btn = document.createElement("button");
        btn.className = "text-[10px] font-black uppercase tracking-wide text-red-600 hover:text-red-700";
        btn.textContent = "Remover";
        btn.setAttribute("data-remove", row.id);
        tdActions.appendChild(btn);
        tr.appendChild(tdActions);

        tableBody.appendChild(tr);
      });
    };

    tableBody.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-remove]");
      if (!btn) return;
      const id = btn.getAttribute("data-remove");
      const rows = loadData().filter((row) => row.id !== id);
      saveData(rows);
      render();
    });

    document.getElementById("clear-all").addEventListener("click", () => {
      const rows = loadData();
      if (!rows.length) return;
      if (!confirm("Deseja remover todos os registros?")) return;
      saveData([]);
      render();
    });

    render();
  </script>
  <script>
    (function () {
      const KEY = "gdf_theme_v1";
      const root = document.body;
      const btn = document.getElementById("theme-toggle");
      const apply = (theme) => {
        const isDark = theme === "dark";
        root.classList.toggle("dark", isDark);
        btn.textContent = isDark ? "Modo claro" : "Modo escuro";
      };
      const saved = localStorage.getItem(KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(saved || (prefersDark ? "dark" : "light"));
      btn.addEventListener("click", () => {
        const next = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem(KEY, next);
        apply(next);
      });
    })();
  </script>
</body>
</html>
