<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Relatorio de Demandas</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link id="app-css" rel="stylesheet" href="./styles.css" />
  <script>
    (function () {
      const link = document.getElementById("app-css");
      if (!link) return;
      const isGh = location.hostname.endsWith("github.io");
      const repo = isGh ? location.pathname.split("/").filter(Boolean)[0] : "";
      const fallback = repo ? `/${repo}/styles.css` : "";
      link.addEventListener("error", () => {
        if (fallback && link.getAttribute("href") !== fallback) {
          link.setAttribute("href", fallback);
        }
      });
    })();
  </script>
  <script>
    (function () {
      const KEY = "hub_theme_v1";
      const defaults = { accent: "#004587", text: "#0f172a", bg: "#f1f5f9", highlight: "#22c55e" };
      const clamp = (n) => Math.max(0, Math.min(255, n));
      const hexToRgb = (hex) => {
        const clean = String(hex || "").replace("#", "");
        if (clean.length !== 6) return null;
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16),
        };
      };
      const mutedFrom = (hex) => {
        const rgb = hexToRgb(hex);
        if (!rgb) return "rgb(71,85,105)";
        const mix = (c) => clamp(Math.round(c + (255 - c) * 0.35));
        return `rgb(${mix(rgb.r)}, ${mix(rgb.g)}, ${mix(rgb.b)})`;
      };
      let settings = defaults;
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) settings = { ...defaults, ...JSON.parse(raw) };
      } catch {}
      const muted = mutedFrom(settings.text);
      const highlightRgb = hexToRgb(settings.highlight) || { r: 34, g: 197, b: 94 };
      const mixRgb = (rgb, target, amount) => ({
        r: clamp(Math.round(rgb.r + (target.r - rgb.r) * amount)),
        g: clamp(Math.round(rgb.g + (target.g - rgb.g) * amount)),
        b: clamp(Math.round(rgb.b + (target.b - rgb.b) * amount)),
      });
      const toRgb = (rgb) => `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
      const highlightSoft = toRgb(mixRgb(highlightRgb, { r: 255, g: 255, b: 255 }, 0.85));
      const highlightBorder = toRgb(mixRgb(highlightRgb, { r: 255, g: 255, b: 255 }, 0.7));
      const highlightText = toRgb(mixRgb(highlightRgb, { r: 0, g: 0, b: 0 }, 0.55));
      const root = document.documentElement;
      root.style.setProperty("--app-accent", settings.accent);
      root.style.setProperty("--app-text", settings.text);
      root.style.setProperty("--app-text-muted", muted);
      root.style.setProperty("--app-bg", settings.bg);
      root.style.setProperty("--app-highlight", settings.highlight);
      root.style.setProperty("--app-highlight-soft", highlightSoft);
      root.style.setProperty("--app-highlight-border", highlightBorder);
      root.style.setProperty("--app-highlight-text", highlightText);
    })();
  </script>
</head>

<body class="bg-slate-100 app-theme app-bg ui-theme">
  <button id="theme-toggle" class="theme-toggle no-print-area" type="button">Modo escuro</button>
  <a href="./index.html" class="back-to-index no-print-area" aria-label="Voltar ao hub"><- Voltar ao hub</a>
  <div id="root"></div>

  <script>
    (function () {
      const KEY = "gdf_theme_v1";
      const root = document.body;
      const btn = document.getElementById("theme-toggle");
      const apply = (theme) => {
        const isDark = theme === "dark";
        root.classList.toggle("dark", isDark);
        btn.textContent = isDark ? "Modo claro" : "Modo escuro";
      };
      const saved = localStorage.getItem(KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(saved || (prefersDark ? "dark" : "light"));
      btn.addEventListener("click", () => {
        const next = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem(KEY, next);
        apply(next);
      });
    })();
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo, useDeferredValue, startTransition } = React;

    const STORAGE_KEY = "relatorio_demandas_v1";
    const DEFAULT_META = {
      orgao: "GOVERNO DO DISTRITO FEDERAL",
      admRegional: "ADMINISTRACAO REGIONAL DO PLANO PILOTO",
      setor: "",
      tituloRelatorio: "RELATORIO DE DEMANDAS",
      data: new Date().toISOString().split("T")[0],
      localGeral: "",
      responsavel: "",
      cargo: "",
      matricula: "",
    };

    let cachedDraft = undefined;

    const generateId = () => crypto?.randomUUID?.() || Math.random().toString(36).slice(2);

    const loadDraft = () => {
      if (cachedDraft !== undefined) return cachedDraft;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        cachedDraft = raw ? JSON.parse(raw) : null;
      } catch {
        cachedDraft = null;
      }
      return cachedDraft;
    };

    const formatDateBR = (iso) => {
      if (!iso) return "";
      const parts = String(iso).split("-");
      return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : iso;
    };

    const formatBytes = (bytes) => {
      if (!bytes && bytes !== 0) return "";
      const kb = bytes / 1024;
      if (kb < 1024) return `${Math.round(kb)} KB`;
      return `${(kb / 1024).toFixed(2)} MB`;
    };

    const createEmptyDemandItem = () => ({
      id: generateId(),
      titulo: "",
      descricao: "",
      fotos: [],
    });

    const normalizePhoto = (photo) => {
      if (!photo || !photo.url) return null;
      return {
        id: photo.id || generateId(),
        url: String(photo.url),
        bytes: Number(photo.bytes) || 0,
        mime: photo.mime || "image/jpeg",
        width: Number(photo.width) || Number(photo.w) || 0,
        height: Number(photo.height) || Number(photo.h) || 0,
      };
    };

    const normalizeDemandItem = (item) => ({
      id: item?.id || generateId(),
      titulo: String(item?.titulo || ""),
      descricao: String(item?.descricao || ""),
      fotos: Array.isArray(item?.fotos) ? item.fotos.map(normalizePhoto).filter(Boolean) : [],
    });

    const getInitialMeta = () => {
      const draft = loadDraft();
      return { ...DEFAULT_META, ...(draft?.reportMeta || {}) };
    };

    const getInitialItems = () => {
      const draft = loadDraft();
      const savedItems = Array.isArray(draft?.demandItems) ? draft.demandItems.map(normalizeDemandItem) : [];
      return savedItems.length ? savedItems : [createEmptyDemandItem()];
    };

    // Icones reaproveitados para manter o mesmo padrao visual dos outros geradores.
    const LucideIcon = ({ name, size = 24, className = "", ...props }) => {
      const [svgHtml, setSvgHtml] = useState("");

      useEffect(() => {
        const renderIcon = () => {
          if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
            const iconElement = window.lucide.createElement(window.lucide.icons[name]);
            iconElement.setAttribute("width", size);
            iconElement.setAttribute("height", size);
            let finalClass = "lucide";
            if (className) finalClass += ` ${className}`;
            iconElement.setAttribute("class", finalClass);
            setSvgHtml(iconElement.outerHTML);
          }
        };

        renderIcon();
        const interval = setInterval(() => {
          if (window.lucide) {
            renderIcon();
            clearInterval(interval);
          }
        }, 200);

        return () => clearInterval(interval);
      }, [name, size, className]);

      if (!svgHtml) {
        return <span style={{ width: size, height: size, display: "inline-block" }}></span>;
      }

      return (
        <span
          dangerouslySetInnerHTML={{ __html: svgHtml }}
          style={{ display: "inline-flex", alignItems: "center" }}
          {...props}
        />
      );
    };

    const Building2 = (p) => <LucideIcon name="Building2" {...p} />;
    const FileText = (p) => <LucideIcon name="FileText" {...p} />;
    const UserCheck = (p) => <LucideIcon name="UserCheck" {...p} />;
    const LayoutGrid = (p) => <LucideIcon name="LayoutGrid" {...p} />;
    const ImageIcon = (p) => <LucideIcon name="Image" {...p} />;
    const Plus = (p) => <LucideIcon name="Plus" {...p} />;
    const Trash2 = (p) => <LucideIcon name="Trash2" {...p} />;
    const Printer = (p) => <LucideIcon name="Printer" {...p} />;
    const Save = (p) => <LucideIcon name="Save" {...p} />;
    const ShieldCheck = (p) => <LucideIcon name="ShieldCheck" {...p} />;
    const ClipboardCheck = (p) => <LucideIcon name="ClipboardCheck" {...p} />;

    const SectionTitle = ({ icon: Icon, children }) => (
      <h2 className="text-[12px] font-black text-[#004587] uppercase tracking-wider flex items-center gap-2 border-b pb-2">
        {Icon ? <Icon size={14} /> : null}
        {children}
      </h2>
    );

    const TextField = ({ label, name, value, onChange, placeholder = "", type = "text", disabled = false }) => (
      <label className="block space-y-1">
        <span className="text-[11px] font-black uppercase tracking-wide text-slate-500">{label}</span>
        <input
          type={type}
          name={name}
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          disabled={disabled}
          className="w-full p-3 border rounded-xl text-[13px] leading-relaxed bg-white shadow-sm"
        />
      </label>
    );

    const TextareaField = ({ label, value, onChange, placeholder = "", rows = 3, disabled = false }) => (
      <label className="block space-y-1">
        <span className="text-[11px] font-black uppercase tracking-wide text-slate-500">{label}</span>
        <textarea
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          rows={rows}
          disabled={disabled}
          className="w-full p-3 border rounded-xl text-[13px] leading-relaxed bg-white shadow-sm resize-y"
        />
      </label>
    );

    const DemandEditor = ({
      item,
      index,
      disabled,
      isProcessing,
      onChangeField,
      onRemoveDemand,
      onUploadPhotos,
      onRemovePhoto,
    }) => {
      const totalBytes = item.fotos.reduce((sum, photo) => sum + (photo.bytes || 0), 0);

      return (
        <article className="rounded-2xl border border-slate-200 bg-white shadow-sm p-4 space-y-4">
          <div className="flex items-center justify-between gap-3">
            <div>
              <p className="text-[10px] font-black uppercase tracking-[0.18em] text-slate-400">Conjunto</p>
              <h3 className="text-base font-black text-[#004587]">Demanda {String(index + 1).padStart(2, "0")}</h3>
            </div>
            <button
              type="button"
              onClick={() => onRemoveDemand(item.id)}
              disabled={disabled}
              className="inline-flex items-center gap-2 rounded-xl border border-red-100 bg-red-50 px-3 py-2.5 text-[11px] font-black uppercase tracking-wide text-red-600 disabled:opacity-40"
            >
              <Trash2 size={14} />
              Remover
            </button>
          </div>

          <TextField
            label="Titulo da demanda"
            value={item.titulo}
            onChange={(e) => onChangeField(item.id, "titulo", e.target.value)}
            placeholder="Ex: Parquinho"
            disabled={disabled}
          />

          <TextareaField
            label="Descricao do que precisa ser feito"
            value={item.descricao}
            onChange={(e) => onChangeField(item.id, "descricao", e.target.value)}
            placeholder="Descreva o problema identificado e o servico necessario."
            rows={4}
            disabled={disabled}
          />

          <div className="space-y-3">
            <div className="flex items-center justify-between gap-3">
              <div>
                <p className="text-[11px] font-black uppercase tracking-wide text-slate-500">Imagens</p>
                <p className="text-[11px] text-slate-500">
                  {item.fotos.length} foto(s) | {formatBytes(totalBytes)}
                </p>
              </div>
              {isProcessing && (
                <span className="text-[11px] font-bold text-orange-600">Processando imagens...</span>
              )}
            </div>

            <label className={`flex flex-col items-center justify-center w-full rounded-2xl border-2 border-dashed p-4 text-center transition-all ${
              disabled ? "border-slate-200 bg-slate-50 cursor-wait" : "border-blue-200 bg-blue-50/60 hover:bg-blue-100/60 cursor-pointer"
            }`}>
              <Plus size={18} className={disabled ? "text-slate-400" : "text-[#004587]"} />
              <span className={`mt-2 text-[11px] font-black uppercase tracking-wide ${
                disabled ? "text-slate-400" : "text-[#004587]"
              }`}>
                {disabled ? "Aguarde..." : "Adicionar imagens desta demanda"}
              </span>
              <input
                type="file"
                className="hidden"
                multiple
                accept="image/*"
                onChange={(e) => onUploadPhotos(item.id, e)}
                disabled={disabled}
              />
            </label>

            {item.fotos.length > 0 && (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {item.fotos.map((photo, photoIndex) => (
                  <div key={photo.id} className="rounded-xl border border-slate-200 bg-slate-50 p-2">
                    <img
                      src={photo.url}
                      alt={`Imagem da demanda ${index + 1}`}
                      className="w-full h-28 object-cover rounded-lg border bg-white"
                      decoding="async"
                    />
                    <div className="mt-2 flex items-center justify-between gap-2">
                      <div className="min-w-0">
                        <p className="text-[10px] font-black uppercase tracking-wide text-slate-500">
                          Imagem {String(photoIndex + 1).padStart(2, "0")}
                        </p>
                        <p className="text-[10px] text-slate-500 truncate">
                          {formatBytes(photo.bytes)}{photo.width && photo.height ? ` | ${photo.width}x${photo.height}` : ""}
                        </p>
                      </div>
                      <button
                        type="button"
                        onClick={() => onRemovePhoto(item.id, photo.id)}
                        disabled={disabled}
                        className="inline-flex items-center justify-center rounded-lg p-2 text-red-500 hover:bg-red-50 disabled:opacity-40"
                      >
                        <Trash2 size={14} />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </article>
      );
    };

    // A compressao reduz peso e permite restaurar o rascunho depois do recarregamento.
    const resizeImageToDataUrl = (file, maxSide = 1200, quality = 0.62) =>
      new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;

            if (width > height && width > maxSide) {
              height = Math.round((height * maxSide) / width);
              width = maxSide;
            } else if (height >= width && height > maxSide) {
              width = Math.round((width * maxSide) / height);
              height = maxSide;
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");

            if (!ctx) {
              reject(new Error("Canvas indisponivel"));
              return;
            }

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(img, 0, 0, width, height);

            const mime = "image/jpeg";
            canvas.toBlob((blob) => {
              if (!blob) {
                reject(new Error("Falha ao comprimir imagem"));
                return;
              }

              const outputReader = new FileReader();
              outputReader.onloadend = () => {
                resolve({
                  url: outputReader.result,
                  bytes: blob.size,
                  mime,
                  width,
                  height,
                });
              };
              outputReader.onerror = () => reject(new Error("Falha ao gerar Data URL"));
              outputReader.readAsDataURL(blob);
            }, mime, quality);
          };
          img.onerror = () => reject(new Error("Imagem invalida"));
          img.src = event.target.result;
        };
        reader.onerror = () => reject(new Error("Falha ao ler arquivo"));
        reader.readAsDataURL(file);
      });

    const fileToDataUrl = (file) =>
      new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          resolve({
            url: reader.result,
            bytes: file.size || 0,
            mime: file.type || "image/*",
            width: 0,
            height: 0,
          });
        };
        reader.onerror = () => reject(new Error("Falha no fallback da imagem"));
        reader.readAsDataURL(file);
      });

    async function waitForImagesReady(rootEl) {
      if (!rootEl) return;

      const images = Array.from(rootEl.querySelectorAll("img"));
      await Promise.all(
        images.map(async (img) => {
          try {
            if (!img.complete) {
              await new Promise((resolve) => {
                const done = () => resolve();
                img.addEventListener("load", done, { once: true });
                img.addEventListener("error", done, { once: true });
              });
            }
            if (img.decode) {
              await img.decode().catch(() => {});
            }
          } catch {}
        })
      );
    }

    const App = () => {
      const repoBase = (() => {
        const isGh = typeof location !== "undefined" && location.hostname.endsWith("github.io");
        const repo = isGh ? location.pathname.split("/").filter(Boolean)[0] : "";
        return repo ? `/${repo}` : "";
      })();
      const imgBrasaoURL = "./B_DF_Brasil.png";
      const imgBrasaoURLFallback = repoBase ? `${repoBase}/B_DF_Brasil.png` : imgBrasaoURL;
      const reportRef = useRef(null);

      // Estado principal: dados fixos do relatorio e lista dinamica de demandas.
      const [reportMeta, setReportMeta] = useState(getInitialMeta);
      const [demandItems, setDemandItems] = useState(getInitialItems);
      const [autoSaved, setAutoSaved] = useState(false);
      const [saveError, setSaveError] = useState("");
      const [processingDemandId, setProcessingDemandId] = useState("");
      const [isPrinting, setIsPrinting] = useState(false);

      const deferredDemandItems = useDeferredValue(demandItems);

      const visibleDemandItems = useMemo(
        () =>
          deferredDemandItems.filter(
            (item) => item.titulo.trim() || item.descricao.trim() || item.fotos.length > 0
          ),
        [deferredDemandItems]
      );

      const totalPhotos = useMemo(
        () => demandItems.reduce((sum, item) => sum + item.fotos.length, 0),
        [demandItems]
      );

      const totalBytes = useMemo(
        () =>
          demandItems.reduce(
            (sum, item) => sum + item.fotos.reduce((innerSum, photo) => innerSum + (photo.bytes || 0), 0),
            0
          ),
        [demandItems]
      );

      useEffect(() => {
        const timer = setTimeout(() => {
          try {
            const draft = { reportMeta, demandItems };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(draft));
            cachedDraft = draft;
            setSaveError("");
            setAutoSaved(true);
          } catch (error) {
            setSaveError("O navegador nao conseguiu salvar todo o rascunho. Reduza a quantidade de imagens se necessario.");
          }
        }, 250);

        return () => clearTimeout(timer);
      }, [reportMeta, demandItems]);

      useEffect(() => {
        if (!autoSaved) return undefined;
        const timer = setTimeout(() => setAutoSaved(false), 1800);
        return () => clearTimeout(timer);
      }, [autoSaved]);

      const handleMetaChange = (event) => {
        const { name, value } = event.target;
        setReportMeta((prev) => ({ ...prev, [name]: value }));
      };

      const handleDemandFieldChange = (itemId, field, value) => {
        setDemandItems((prev) =>
          prev.map((item) => (item.id === itemId ? { ...item, [field]: value } : item))
        );
      };

      const handleAddDemand = () => {
        setDemandItems((prev) => [...prev, createEmptyDemandItem()]);
      };

      const handleRemoveDemand = (itemId) => {
        setDemandItems((prev) => prev.filter((item) => item.id !== itemId));
      };

      // Cada upload altera apenas o bloco escolhido, mantendo o restante intacto.
      const handleUploadPhotos = async (itemId, event) => {
        const files = Array.from(event.target.files || []);
        event.target.value = "";
        if (!files.length) return;

        setProcessingDemandId(itemId);

        try {
          const processedPhotos = [];
          for (const file of files) {
            try {
              const result = await resizeImageToDataUrl(file);
              processedPhotos.push({
                id: generateId(),
                url: result.url,
                bytes: result.bytes,
                mime: result.mime,
                width: result.width,
                height: result.height,
              });
            } catch (error) {
              const fallback = await fileToDataUrl(file);
              processedPhotos.push({
                id: generateId(),
                url: fallback.url,
                bytes: fallback.bytes,
                mime: fallback.mime,
                width: fallback.width,
                height: fallback.height,
              });
            }
          }

          startTransition(() => {
            setDemandItems((prev) =>
              prev.map((item) =>
                item.id === itemId ? { ...item, fotos: [...item.fotos, ...processedPhotos] } : item
              )
            );
          });
        } finally {
          setProcessingDemandId("");
        }
      };

      const handleRemovePhoto = (itemId, photoId) => {
        setDemandItems((prev) =>
          prev.map((item) =>
            item.id === itemId
              ? { ...item, fotos: item.fotos.filter((photo) => photo.id !== photoId) }
              : item
          )
        );
      };

      const handlePrint = async () => {
        if (processingDemandId || isPrinting) return;

        setIsPrinting(true);
        const originalTitle = document.title;
        const wasDark = document.body.classList.contains("dark");

        if (wasDark) {
          document.body.classList.remove("dark");
        }

        const safeTitle = (reportMeta.tituloRelatorio || "Relatorio_de_Demandas")
          .replace(/[^a-zA-Z0-9\s\-_]/g, "")
          .trim()
          .replace(/\s+/g, "_")
          .slice(0, 60);

        document.title = `${safeTitle || "Relatorio_de_Demandas"}_${reportMeta.data || "sem-data"}`;

        try {
          await waitForImagesReady(reportRef.current);
          await new Promise((resolve) => setTimeout(resolve, 200));
          window.print();
        } finally {
          setTimeout(() => {
            document.title = originalTitle;
            if (wasDark) {
              document.body.classList.add("dark");
            }
            setIsPrinting(false);
          }, 500);
        }
      };

      return (
        <div className="min-h-screen p-4 sm:p-6 pt-20 pb-24">
          <div className="max-w-[1600px] mx-auto flex flex-col xl:flex-row gap-5">
            <aside className="w-full xl:w-[420px] no-print-area">
              <div className="bg-white rounded-3xl shadow-2xl border border-slate-200 p-5 sm:p-6 space-y-6 xl:sticky xl:top-6">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <p className="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">Novo fluxo</p>
                    <h1 className="text-2xl font-black text-[#004587] leading-tight">Relatorio de Demandas</h1>
                    <p className="mt-2 text-sm leading-relaxed text-slate-600">
                      Monte blocos repetiveis com titulo, descricao e varias imagens para cada demanda.
                    </p>
                  </div>
                  {autoSaved && (
                    <div className="shrink-0 inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-[11px] font-black uppercase tracking-wide text-emerald-700">
                      <Save size={12} />
                      Salvo
                    </div>
                  )}
                </div>

                {saveError && (
                  <div className="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-[13px] leading-relaxed font-semibold text-red-700">
                    {saveError}
                  </div>
                )}

                <section className="space-y-3">
                  <SectionTitle icon={Building2}>Cabecalho Administrativo</SectionTitle>
                  <TextField label="Orgao" name="orgao" value={reportMeta.orgao} onChange={handleMetaChange} disabled={Boolean(processingDemandId) || isPrinting} />
                  <TextField label="Administracao Regional" name="admRegional" value={reportMeta.admRegional} onChange={handleMetaChange} disabled={Boolean(processingDemandId) || isPrinting} />
                  <TextField label="Setor" name="setor" value={reportMeta.setor} onChange={handleMetaChange} placeholder="Ex: DIROB" disabled={Boolean(processingDemandId) || isPrinting} />
                </section>

                <section className="space-y-3">
                  <SectionTitle icon={FileText}>Identificacao do Relatorio</SectionTitle>
                  <TextField label="Titulo do relatorio" name="tituloRelatorio" value={reportMeta.tituloRelatorio} onChange={handleMetaChange} disabled={Boolean(processingDemandId) || isPrinting} />
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <TextField label="Data" name="data" type="date" value={reportMeta.data} onChange={handleMetaChange} disabled={Boolean(processingDemandId) || isPrinting} />
                    <TextField label="Local geral" name="localGeral" value={reportMeta.localGeral} onChange={handleMetaChange} placeholder="Ex: SQN 302" disabled={Boolean(processingDemandId) || isPrinting} />
                  </div>
                </section>

                <section className="space-y-3">
                  <SectionTitle icon={UserCheck}>Responsavel</SectionTitle>
                  <TextField label="Nome" name="responsavel" value={reportMeta.responsavel} onChange={handleMetaChange} placeholder="Nome do responsavel" disabled={Boolean(processingDemandId) || isPrinting} />
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <TextField label="Cargo" name="cargo" value={reportMeta.cargo} onChange={handleMetaChange} placeholder="Cargo / Funcao" disabled={Boolean(processingDemandId) || isPrinting} />
                    <TextField label="Matricula" name="matricula" value={reportMeta.matricula} onChange={handleMetaChange} placeholder="Matricula" disabled={Boolean(processingDemandId) || isPrinting} />
                  </div>
                </section>

                <section className="space-y-3">
                  <div className="flex items-center justify-between gap-3">
                    <SectionTitle icon={LayoutGrid}>Demandas</SectionTitle>
                    <button
                      type="button"
                      onClick={handleAddDemand}
                      disabled={Boolean(processingDemandId) || isPrinting}
                      className="inline-flex items-center gap-2 rounded-xl bg-[#004587] px-3 py-2.5 text-[11px] font-black uppercase tracking-wide text-white shadow-md disabled:opacity-50"
                    >
                      <Plus size={14} />
                      Adicionar
                    </button>
                  </div>

                  <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[13px] leading-relaxed text-slate-600">
                    Blocos vazios continuam no painel para edicao, mas so entram no relatorio quando recebem conteudo.
                  </div>

                  <div className="flex items-center justify-between gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-[13px]">
                    <span className="font-bold text-slate-600">Resumo atual</span>
                    <span className="font-black text-[#004587]">
                      {demandItems.length} bloco(s) | {totalPhotos} foto(s) | {formatBytes(totalBytes)}
                    </span>
                  </div>

                  <div className="space-y-4 max-h-[48vh] overflow-y-auto pr-1 custom-scrollbar">
                    {demandItems.map((item, index) => (
                      <DemandEditor
                        key={item.id}
                        item={item}
                        index={index}
                        disabled={Boolean(processingDemandId) || isPrinting}
                        isProcessing={processingDemandId === item.id}
                        onChangeField={handleDemandFieldChange}
                        onRemoveDemand={handleRemoveDemand}
                        onUploadPhotos={handleUploadPhotos}
                        onRemovePhoto={handleRemovePhoto}
                      />
                    ))}

                    {demandItems.length === 0 && (
                      <div className="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-sm font-semibold text-slate-500">
                        Nenhum bloco no momento. Use "Adicionar" para criar a primeira demanda.
                      </div>
                    )}
                  </div>
                </section>

                <button
                  type="button"
                  onClick={handlePrint}
                  disabled={Boolean(processingDemandId) || isPrinting}
                  className="w-full flex items-center justify-center gap-3 rounded-2xl bg-[#004587] py-4 text-[12px] font-black uppercase tracking-[0.14em] text-white shadow-xl transition-all active:scale-[0.99] disabled:opacity-50"
                >
                  <Printer size={18} />
                  {isPrinting ? "Preparando impressao..." : "Gerar PDF / Imprimir"}
                </button>
              </div>
            </aside>

            <main className="flex-1 bg-white shadow-2xl overflow-y-auto min-h-screen rounded-3xl border border-slate-200 print-area print-area--absolute print:shadow-none print:border-none print:rounded-none report-light">
              <div ref={reportRef} id="report-content" className="mx-auto bg-white min-h-screen report-light">
                <div className="hidden print:flex fixed bottom-0 left-0 right-0 h-8 flex-col items-center justify-center border-t border-slate-100 bg-white z-[999]">
                  <p className="text-[8px] font-black text-[#004587] uppercase">Governo do Distrito Federal</p>
                  <p className="text-[7px] font-bold text-slate-500 uppercase tracking-wide">
                    {reportMeta.admRegional} {reportMeta.setor ? `| ${reportMeta.setor}` : ""}
                  </p>
                </div>

                <div className="mx-auto bg-white shadow-sm print:shadow-none border-b print:border-none p-4 md:p-8">
                  <div className="flex items-center justify-between mb-5 w-full h-[100px] px-4">
                    <div className="w-[80px] flex justify-start items-center">
                      <img
                        src={imgBrasaoURL}
                        onError={(e) => {
                          if (e.currentTarget.src !== imgBrasaoURLFallback) e.currentTarget.src = imgBrasaoURLFallback;
                        }}
                        alt="Brasao DF"
                        className="h-16 object-contain"
                        decoding="async"
                      />
                    </div>
                    <div className="flex-1 flex flex-col items-center text-center px-4">
                      <h1 className="text-lg font-bold text-[#004587] tracking-[0.18em] uppercase leading-tight">{reportMeta.orgao}</h1>
                      <div className="w-24 h-[2px] bg-[#004587] my-1 opacity-30 rounded-full"></div>
                      <h2 className="text-[12px] font-bold text-slate-600 uppercase tracking-wide leading-tight">{reportMeta.admRegional}</h2>
                      <h3 className="text-[11px] font-black text-[#004587] uppercase tracking-[0.16em] italic">{reportMeta.setor || "SETOR"}</h3>
                    </div>
                    <div className="w-[80px]"></div>
                  </div>

                  <div className="bg-[#004587] text-white py-2 px-6 rounded-md mb-5 text-center shadow-md">
                    <h3 className="text-sm font-black tracking-[0.16em] uppercase leading-relaxed">{reportMeta.tituloRelatorio}</h3>
                  </div>

                  <div className="mb-4 border-b border-slate-100 pb-3 avoid-break">
                    <div className="flex items-center gap-2 mb-3 px-2 font-black text-[#004587] text-[11px] tracking-[0.16em] uppercase">
                      <ShieldCheck size={14} />
                      1. Identificacao do Relatorio
                    </div>
                    <div className="grid grid-cols-2 gap-x-8 gap-y-3 px-4 text-left text-[11px]">
                      <div>
                        <span className="block font-black text-[#004587] uppercase text-[9px] mb-0.5 opacity-70">Data</span>
                        <span className="font-bold text-slate-900 leading-tight">{formatDateBR(reportMeta.data)}</span>
                      </div>

                      {reportMeta.localGeral.trim() && (
                        <div>
                          <span className="block font-black text-[#004587] uppercase text-[9px] mb-0.5 opacity-70">Local geral</span>
                          <span className="font-bold text-slate-900 leading-tight">{reportMeta.localGeral}</span>
                        </div>
                      )}

                      {reportMeta.responsavel.trim() && (
                        <div>
                          <span className="block font-black text-[#004587] uppercase text-[9px] mb-0.5 opacity-70">Responsavel</span>
                          <span className="font-bold text-slate-900 leading-tight">{reportMeta.responsavel}</span>
                        </div>
                      )}

                      {reportMeta.cargo.trim() && (
                        <div>
                          <span className="block font-black text-[#004587] uppercase text-[9px] mb-0.5 opacity-70">Cargo</span>
                          <span className="font-bold text-slate-900 leading-tight">{reportMeta.cargo}</span>
                        </div>
                      )}

                      {reportMeta.matricula.trim() && (
                        <div>
                          <span className="block font-black text-[#004587] uppercase text-[9px] mb-0.5 opacity-70">Matricula</span>
                          <span className="font-bold text-slate-900 leading-tight">{reportMeta.matricula}</span>
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="avoid-break">
                    <div className="border-b-2 border-[#004587] mb-3 pb-1 font-black uppercase text-[#004587] text-[12px] flex items-center gap-2 tracking-wide">
                      <ClipboardCheck size={14} />
                      2. Demandas registradas
                    </div>

                    {visibleDemandItems.length === 0 ? (
                      <div className="p-4 bg-slate-50 rounded-2xl text-[13px] leading-relaxed text-slate-600 italic">
                        Nenhuma demanda preenchida ate o momento.
                      </div>
                    ) : (
                      <div className="space-y-5">
                        {visibleDemandItems.map((item, index) => {
                          const gridClass = item.fotos.length <= 1 ? "grid-cols-1" : "grid-cols-2";

                          return (
                            <section key={item.id} className="avoid-break rounded-2xl border border-slate-200 bg-white shadow-sm p-4">
                              <div className="flex items-center gap-2 mb-3 font-black text-[#004587] text-[11px] tracking-[0.16em] uppercase">
                                <LayoutGrid size={14} />
                                Demanda {String(index + 1).padStart(2, "0")}
                              </div>

                              {item.titulo.trim() && (
                                <div className="mb-3">
                                  <p className="text-[9px] font-black uppercase tracking-[0.14em] text-slate-400 mb-1">Titulo</p>
                                  <p className="text-base font-black text-slate-900">{item.titulo}</p>
                                </div>
                              )}

                              {item.descricao.trim() && (
                                <div className="mb-3">
                                  <p className="text-[9px] font-black uppercase tracking-[0.14em] text-slate-400 mb-1">Descricao</p>
                                  <div className="rounded-xl bg-slate-50 px-4 py-3 text-[12px] text-slate-700 leading-relaxed whitespace-pre-wrap text-justify">
                                    {item.descricao}
                                  </div>
                                </div>
                              )}

                              {item.fotos.length > 0 && (
                                <div>
                                  <div className="flex items-center gap-2 mb-2 text-[9px] font-black uppercase tracking-[0.14em] text-slate-400">
                                    <ImageIcon size={12} />
                                    Registro fotografico
                                  </div>
                                  <div className={`grid gap-3 ${gridClass}`}>
                                    {item.fotos.map((photo, photoIndex) => (
                                      <div key={photo.id} className="border rounded-xl bg-white overflow-hidden avoid-break">
                                        <div className="px-3 py-1.5 bg-slate-50 border-b text-[8px] font-black text-slate-400 text-center uppercase tracking-wide">
                                          Imagem {String(photoIndex + 1).padStart(2, "0")}
                                        </div>
                                        <div className="bg-slate-100">
                                          <img
                                            src={photo.url}
                                            alt={`Imagem ${photoIndex + 1} da demanda ${index + 1}`}
                                            className="w-full h-56 object-contain bg-slate-100"
                                            decoding="async"
                                          />
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </section>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>

                <div className="page-content mx-auto bg-white p-4 md:p-8">
                  <div className="mt-8 pt-4 avoid-break w-full flex flex-col items-center justify-center text-center">
                    <div className="mb-8 text-[11px] text-slate-600">Brasilia - DF, {formatDateBR(reportMeta.data)}</div>
                    <div className="w-64 h-[1px] bg-slate-400 mb-2"></div>
                    {reportMeta.responsavel.trim() && (
                      <p className="text-[12px] font-black text-[#004587] uppercase tracking-wide mb-0.5">{reportMeta.responsavel}</p>
                    )}
                    {reportMeta.cargo.trim() && (
                      <p className="text-[10px] font-bold text-slate-600 uppercase mb-0.5">{reportMeta.cargo}</p>
                    )}
                    {reportMeta.matricula.trim() && (
                      <p className="text-[10px] text-slate-500">Matricula {reportMeta.matricula}</p>
                    )}
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
