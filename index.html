<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub de Geradores - Relatórios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link id="app-css" rel="stylesheet" href="./styles.css" />
  <script>
    (function () {
      const link = document.getElementById("app-css");
      if (!link) return;
      const isGh = location.hostname.endsWith("github.io");
      const repo = isGh ? location.pathname.split("/").filter(Boolean)[0] : "";
      const fallback = repo ? `/${repo}/styles.css` : "";
      link.addEventListener("error", () => {
        if (fallback && link.getAttribute("href") !== fallback) {
          link.setAttribute("href", fallback);
        }
      });
    })();
  </script>
</head>
<body class="min-h-screen text-slate-800 hub-body">
  <main class="max-w-6xl mx-auto p-4 sm:p-6 md:p-10">
    <section class="hub-shell p-6 sm:p-8 md:p-10">
      <header class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between mb-8 md:mb-10">
        <div class="space-y-4">
          <div class="hub-pill inline-flex items-center gap-2 text-slate-600">
            Hub central de geradores
          </div>
          <div>
            <p class="text-[11px] font-bold uppercase tracking-[0.3em] text-slate-400 hub-brand">DIROB</p>
            <h1 class="mt-2 text-3xl sm:text-4xl md:text-5xl font-black text-slate-900 leading-tight hub-title">
              Geradores de Relatório
            </h1>
          </div>
          <p class="text-sm sm:text-base text-slate-600 max-w-2xl">
            Acesso rápido aos fluxos de vistoria e calçadas. O catálogo de geradores pode ser ampliado editando o array
            <code>GENERATORS</code>.
          </p>
        </div>
        <div class="flex flex-wrap gap-3"></div>
      </header>

      <section id="cards" class="hub-grid"></section>
    </section>
  </main>
  <button id="theme-toggle" class="theme-toggle no-print-area" type="button" aria-label="Alternar tema">Modo escuro</button>

  <script>
    const GENERATORS = [
      {
        id: "vistoria",
        title: "Relatório de Vistoria",
        description: "Fluxo completo para descrição, mapa, fotos e impressão do relatório de vistoria.",
        file: "./gerador-relatorio-vistoria.html",
        category: "Vistorias",
        status: "Ativo"
      },
      {
        id: "calcada",
        title: "Relatório de Calçada",
        description: "Levantamento de calçadas com dimensões, desenho na planta, cálculos e registro fotográfico.",
        file: "./gerador-relatorio-calcada.html",
        category: "Infraestrutura",
        status: "Ativo"
      },
      {
        id: "mymaps",
        title: "Histórico My Maps",
        description: "Tabela com todos os pontos copiados para o My Maps, salvos no navegador.",
        file: "./mymaps-historico.html",
        category: "My Maps",
        status: "Ativo"
      }
    ];

    const statusColor = {
      Ativo: "bg-emerald-50 text-emerald-700 border-emerald-200",
      "Em desenvolvimento": "bg-amber-50 text-amber-700 border-amber-200",
      Inativo: "bg-slate-100 text-slate-600 border-slate-200"
    };

    const cardsContainer = document.getElementById("cards");
    cardsContainer.innerHTML = GENERATORS.map((generator) => {
      const badgeClass = statusColor[generator.status] || statusColor.Inativo;
      return `
        <article class="hub-card">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-[11px] font-black uppercase tracking-wider text-slate-500">${generator.category}</p>
              <h2 class="mt-1 text-lg sm:text-xl font-black text-slate-900 leading-tight hub-title">${generator.title}</h2>
            </div>
            <span class="hub-status shrink-0 ${badgeClass}">
              ${generator.status}
            </span>
          </div>
          <p class="mt-3 text-sm text-slate-600 leading-relaxed">${generator.description}</p>
          <div class="mt-5">
            <a
              href="${generator.file}"
              class="hub-cta inline-flex items-center justify-center w-full sm:w-auto px-5 py-2 bg-[#004587] text-white text-xs hover:bg-[#003a70] transition-colors"
            >
              Abrir gerador
            </a>
          </div>
        </article>
      `;
    }).join("");
  </script>
  <script>
    (function () {
      const KEY = "gdf_theme_v1";
      const root = document.body;
      const btn = document.getElementById("theme-toggle");
      const apply = (theme) => {
        const isDark = theme === "dark";
        root.classList.toggle("dark", isDark);
        btn.textContent = isDark ? "Modo claro" : "Modo escuro";
      };
      const saved = localStorage.getItem(KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(saved || (prefersDark ? "dark" : "light"));
      btn.addEventListener("click", () => {
        const next = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem(KEY, next);
        apply(next);
      });
    })();
  </script>
</body>
</html>
