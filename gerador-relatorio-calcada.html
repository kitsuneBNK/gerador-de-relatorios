  <script>
    (function () {
      const KEY = "hub_theme_v1";
      const defaults = { accent: "#004587", text: "#0f172a", bg: "#f1f5f9", highlight: "#22c55e" };
      const clamp = (n) => Math.max(0, Math.min(255, n));
      const hexToRgb = (hex) => {
        const clean = String(hex || "").replace("#", "");
        if (clean.length !== 6) return null;
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16),
        };
      };
      const mutedFrom = (hex) => {
        const rgb = hexToRgb(hex);
        if (!rgb) return "rgb(71,85,105)";
        const mix = (c) => clamp(Math.round(c + (255 - c) * 0.35));
        return `rgb(${mix(rgb.r)}, ${mix(rgb.g)}, ${mix(rgb.b)})`;
      };
      let settings = defaults;
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) settings = { ...defaults, ...JSON.parse(raw) };
      } catch {}
      const muted = mutedFrom(settings.text);
      const highlightRgb = hexToRgb(settings.highlight) || { r: 34, g: 197, b: 94 };
      const mixRgb = (rgb, target, amount) => ({
        r: clamp(Math.round(rgb.r + (target.r - rgb.r) * amount)),
        g: clamp(Math.round(rgb.g + (target.g - rgb.g) * amount)),
        b: clamp(Math.round(rgb.b + (target.b - rgb.b) * amount)),
      });
      const toRgb = (rgb) => `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
      const highlightSoft = toRgb(mixRgb(highlightRgb, { r: 255, g: 255, b: 255 }, 0.85));
      const highlightBorder = toRgb(mixRgb(highlightRgb, { r: 255, g: 255, b: 255 }, 0.7));
      const highlightText = toRgb(mixRgb(highlightRgb, { r: 0, g: 0, b: 0 }, 0.55));
      const root = document.documentElement;
      root.style.setProperty("--app-accent", settings.accent);
      root.style.setProperty("--app-text", settings.text);
      root.style.setProperty("--app-text-muted", muted);
      root.style.setProperty("--app-bg", settings.bg);
      root.style.setProperty("--app-highlight", settings.highlight);
      root.style.setProperty("--app-highlight-soft", highlightSoft);
      root.style.setProperty("--app-highlight-border", highlightBorder);
      root.style.setProperty("--app-highlight-text", highlightText);
    })();
  </script>
</head>

<body class="bg-slate-100 app-theme app-bg">
  <button id="theme-toggle" class="theme-toggle no-print-area" type="button">Modo escuro</button>

  <div id="root"></div>
  <script>
    (function () {
      const KEY = "gdf_theme_v1";
      const root = document.body;
      const btn = document.getElementById("theme-toggle");
      const apply = (theme) => {
        const isDark = theme === "dark";
        root.classList.toggle("dark", isDark);
        btn.textContent = isDark ? "Modo claro" : "Modo escuro";
      };
      const saved = localStorage.getItem(KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(saved || (prefersDark ? "dark" : "light"));
      btn.addEventListener("click", () => {
        const next = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem(KEY, next);
        apply(next);
      });
    })();
  </script>
  <script>
    (function () {
      const sequence = ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight", "KeyB", "KeyA"];
      let index = 0;
      let running = false;
      let state = "idle";
      let runToken = 0;

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const ensureOverlay = () => {
        let overlay = document.getElementById("easter-egg-overlay");
        if (overlay) return overlay;
        overlay = document.createElement("div");
        overlay.id = "easter-egg-overlay";
        overlay.className = "easter-egg-overlay";
        overlay.innerHTML = `
          <div class="easter-egg-card">
            <div class="easter-egg-title" id="easter-title">Modo avançado</div>
            <div class="easter-egg-content">
              <div class="easter-egg-icon">×</div>
              <div>
                <div class="easter-egg-message" id="easter-msg"></div>
                <div class="easter-egg-count" id="easter-count"></div>
              </div>
            </div>
          </div>
          <div class="easter-egg-image-wrap" id="easter-image-wrap">
            <img id="easter-image" class="easter-egg-image" src="./image.png" alt="Imagem do modo avançado" />
          </div>
        `;
        document.body.appendChild(overlay);
        return overlay;
      };

      const setOverlay = (title, message, count, iconType = "error") => {
        const overlay = ensureOverlay();
        overlay.classList.add("active");
        const titleEl = overlay.querySelector("#easter-title");
        const msgEl = overlay.querySelector("#easter-msg");
        const countEl = overlay.querySelector("#easter-count");
        const iconEl = overlay.querySelector(".easter-egg-icon");
        if (titleEl) titleEl.textContent = title || "";
        if (msgEl) msgEl.innerHTML = message || "";
        if (countEl) countEl.textContent = typeof count === "number" ? `Contagem: ${count}` : "";
        if (iconEl) {
          const isOk = iconType === "ok";
          iconEl.textContent = isOk ? "✓" : "×";
          iconEl.classList.toggle("ok", isOk);
        }
      };

      const hideOverlay = () => {
        const overlay = document.getElementById("easter-egg-overlay");
        if (overlay) overlay.classList.remove("active");
      };

      const requestFs = async () => {
        const overlay = ensureOverlay();
        if (overlay.requestFullscreen && !document.fullscreenElement) {
          try { await overlay.requestFullscreen(); } catch {}
        }
      };

      const toHex = () => `0x${Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, "0").toUpperCase()}`;
      const formatLines = (lines, extraClass = "") =>
        lines.map((line) => `<div class="easter-egg-line ${extraClass}">${line}</div>`).join("");

      const showFullscreenImage = async (ms = 2000) => {
        const overlay = ensureOverlay();
        overlay.classList.add("image-mode", "active");
        const imgEl = overlay.querySelector("#easter-image");
        if (imgEl) imgEl.src = "./image.png";
        if (overlay.requestFullscreen) {
          try { await overlay.requestFullscreen(); } catch {}
        }
        await sleep(ms);
        if (document.fullscreenElement) {
          try { await document.exitFullscreen(); } catch {}
        }
        overlay.classList.remove("image-mode");
      };

      const showPrompt = () => {
        setOverlay("Sistema", formatLines(["O modo avançado será iniciado.", "Pressione F11 para confirmar."]), null, "ok");
        state = "prompt";
      };

      const startSequence = async () => {
        const token = ++runToken;
        state = "countdown";
        setOverlay("Sistema", formatLines(["Iniciando o modo avançado do site..."]), 3, "ok");
        for (let i = 3; i >= 0; i -= 1) {
          if (token !== runToken) return;
          setOverlay("Sistema", formatLines(["Iniciando o modo avançado do site..."]), i, "ok");
          await sleep(1000);
        }
        if (token !== runToken) return;
        const codeA = toHex();
        const codeB = toHex();
        const errorLines = [
          `Exception Processing Message ${codeA} Parameters`,
          `${codeA} ${codeB} ${codeA} ${codeB}`,
        ];
        setOverlay(
          "client.exe - System Error",
          formatLines(errorLines, "easter-egg-code") + formatLines(["", "Os arquivos foram corrompidos e o PC será formatado."]),
          5,
          "error"
        );
        for (let i = 5; i >= 0; i -= 1) {
          if (token !== runToken) return;
          setOverlay(
            "client.exe - System Error",
            formatLines(errorLines, "easter-egg-code") + formatLines(["", "Os arquivos foram corrompidos e o PC será formatado."]),
            i,
            "error"
          );
          await sleep(1000);
        }
        if (token !== runToken) return;
        state = "image";
        await showFullscreenImage(2000);
        if (token !== runToken) return;
        setOverlay("Sistema", formatLines(["Brincadeira! Era só um easter egg."]), null, "ok");
        state = "final";
        await sleep(2000);
        if (token !== runToken) return;
        hideOverlay();
        state = "idle";
        running = false;
      };

      const runEasterEgg = async () => {
        if (running) return;
        running = true;
        showPrompt();
      };

      window.addEventListener("keydown", (e) => {
        if (e.code === "F11" && running) {
          if (state === "prompt") {
            requestFs();
            startSequence();
            return;
          }
          if (state === "countdown") {
            runToken += 1;
            state = "cancelled";
            setOverlay("Sistema", formatLines(["Contagem cancelada.", "Pressione F11 para recomeçar."]), null, "ok");
            return;
          }
          if (state === "cancelled") {
            requestFs();
            startSequence();
            return;
          }
        }
        if (running) return;
        if (e.code === sequence[index]) {
          index += 1;
          if (index === sequence.length) {
            index = 0;
            runEasterEgg();
          }
        } else {
          index = e.code === sequence[0] ? 1 : 0;
        }
      });
    })();
  </script>

          if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
            const iconElement = window.lucide.createElement(window.lucide.icons[name]);
            iconElement.setAttribute("width", size);
            iconElement.setAttribute("height", size);
            iconElement.setAttribute("class", `lucide ${className}`);
            setSvgHtml(iconElement.outerHTML);
          }
        };
        renderIcon();
        const interval = setInterval(() => { if (window.lucide) { renderIcon(); clearInterval(interval); } }, 200);
        return () => clearInterval(interval);

    // CompressÃ£o de imagem para Base64
    const resizeImageToBase64 = (file, maxSide = 1000, quality = 0.5) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width; let height = img.height;
            if (width > height) { if (width > maxSide) { height *= maxSide / width; width = maxSide; } }
            else { if (height > maxSide) { width *= maxSide / height; height = maxSide; } }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

      const parseNumber = (raw) => {
        if (raw === null || raw === undefined) return NaN;
        let s = String(raw).trim();
        if (!s) return NaN;
        s = s.replace(/[^\d,.\-]/g, "");
        if (!s) return NaN;
        const lastComma = s.lastIndexOf(",");
        const lastDot = s.lastIndexOf(".");
        let decimalSep = null;
        if (lastComma > lastDot) decimalSep = ",";
        else if (lastDot > lastComma) decimalSep = ".";
        if (decimalSep) {
          const parts = s.split(decimalSep);
          const intPart = parts.slice(0, -1).join(decimalSep).replace(/[.,]/g, "");
          const fracPart = parts[parts.length - 1];
          s = `${intPart}.${fracPart}`;
        } else {

        }
        const n = parseFloat(s);

            localStorage.setItem("calcadas_planta_pdf_w_v1", String(plantaPdfWidth));
            localStorage.setItem("calcadas_line_width_v1", String(lineWidthScale));
            localStorage.setItem("calcadas_point_size_v1", String(pointSizeScale));
            setAutoSaved(true); setTimeout(() => setAutoSaved(false), 1000);
          } catch (e) { console.error("LocalStorage cheio"); }
        }, 1000);
        return () => clearTimeout(timer);
      }, [reportData, dimensions, paths, imagemArea, plantaPdfSize, plantaPdfWidth, lineWidthScale, pointSizeScale]);

      // --- CÃLCULOS ---
      const areaTotal = useMemo(() => {
        return dimensions.reduce((acc, d) => {
          const parts = String(d.text || "").split(/[xX*]/).map(p => p.trim()).filter(Boolean);
          if (parts.length < 2) return acc;
          const values = parts.map(parseNumber).filter((n) => Number.isFinite(n));
          if (values.length < 2) return acc;
          const area = values.reduce((prod, n) => prod * n, 1);
          return acc + (Number.isFinite(area) ? area : 0);
        }, 0);
      }, [dimensions]);

      const valorTotal = (areaTotal * (parseNumber(reportData.valorMetroQuadrado) || 0)).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      // --- MOTOR DO CANVAS ---
      useEffect(() => {
        if (imagemArea) {
          const img = new Image();
          let didLoad = false;
          const finalize = () => {
            if (didLoad) return;
            didLoad = true;
            bgRef.current = img;
            drawCanvas();
          };
          img.onload = finalize;
          img.onerror = () => { bgRef.current = null; };
          img.crossOrigin = "anonymous";
          img.src = imagemArea;
          if (img.complete) {
            finalize();
          } else if (img.decode) {
            img.decode().then(finalize).catch(() => {});
          }
        } else {
          bgRef.current = null;
        }
      }, [imagemArea]);

      const handleBgImageLoad = () => {
        const img = bgImgElRef.current;
        if (!img) return;
        bgRef.current = img;
        drawCanvas();
      };

      const drawCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        const img = bgRef.current || bgImgElRef.current;
        if (!canvas || !img) return;
        const ctx = canvas.getContext('2d');
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        if (!w || !h) return;
        canvas.width = w; canvas.height = h;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, w, h);

        const all = currentPath ? [...paths, currentPath] : paths;
        const baseWidth = Math.max(w / 140, 3) / zoom;
        const lw = baseWidth * lineWidthScale;
        const pointRadius = Math.max(lw * 1.8 * pointSizeScale, 2);

        all.forEach(p => {
          if (!p?.points?.length) return;
          ctx.beginPath();
          ctx.strokeStyle = p.color;
          ctx.fillStyle = p.color;
          ctx.lineWidth = lw;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';

          if (p.type === 'vector' && p.points.length > 1) {
            ctx.moveTo(p.points[0].x, p.points[0].y);
            ctx.lineTo(p.points[1].x, p.points[1].y);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(p.points[0].x, p.points[0].y, pointRadius, 0, Math.PI * 2);
            ctx.arc(p.points[1].x, p.points[1].y, pointRadius, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.moveTo(p.points[0].x, p.points[0].y);
            p.points.forEach((pt, i) => { if(i>0) ctx.lineTo(pt.x, pt.y); });
            ctx.stroke();
          }
        });
        if (!currentPath && !isPanning) setDrawnImage(canvas.toDataURL('image/jpeg', 0.8));
      }, [paths, currentPath, zoom, isPanning, lineWidthScale, pointSizeScale]);

      useEffect(() => { drawCanvas(); }, [drawCanvas]);

      const getCoords = (e) => {
        const canvas = canvasRef.current; if(!canvas) return {x:0,y:0};
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        const rx = ev.clientX - rect.left;
        const ry = ev.clientY - rect.top;
        const x = rx * (canvas.width / rect.width);
        const y = ry * (canvas.height / rect.height);
        return { x, y, cx: ev.clientX, cy: ev.clientY };
      };

      const snapVectorPoint = (start, end) => {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 0.001) return end;
        if (!vectorSnapDeg || vectorSnapDeg <= 0) return end;
        const step = (vectorSnapDeg * Math.PI) / 180;
        const angle = Math.atan2(dy, dx);
        const snapped = Math.round(angle / step) * step;
        return { x: start.x + Math.cos(snapped) * dist, y: start.y + Math.sin(snapped) * dist };
      };

      const updateMagnifier = (c) => {
        const half = MAG_SIZE / 2;
        const safeX = Math.min(window.innerWidth - half - 8, Math.max(half + 8, c.cx + 85));
        const safeY = Math.min(window.innerHeight - half - 8, Math.max(half + 8, c.cy - 95));
        setMag({
          show: true,
          x: safeX,
          y: safeY,
          sx: c.x,
          sy: c.y,
        });
      };

      const cycleActiveColor = (direction = 1) => {
        const currentColorIndex = COLORS.indexOf(activeColor);
        const safeIndex = currentColorIndex >= 0 ? currentColorIndex : 0;
        const nextIndex = (safeIndex + direction + COLORS.length) % COLORS.length;
        setActiveColor(COLORS[nextIndex]);
      };

      const handleStart = (e) => {
        if (!imagemArea) return;
        if (e.touches) e.preventDefault();
        const c = getCoords(e);
        if (drawMode === 'pan') { setIsPanning(true); setLastPoint({ x: c.cx, y: c.cy }); return; }

        if (drawMode === 'vector') {
          if (!vectorAnchor) {
            const anchor = { x: c.x, y: c.y };
            setVectorAnchor(anchor);
            setCurrentPath({ type: 'vector', color: activeColor, points: [anchor, anchor] });
            updateMagnifier(c);
            return;
          }

          const snapped = snapVectorPoint(vectorAnchor, { x: c.x, y: c.y });
          setIsDrawing(true);
          setCurrentPath({ type: 'vector', color: activeColor, points: [vectorAnchor, snapped] });
          updateMagnifier(c);
          return;
        }

        setIsDrawing(true);
        setCurrentPath({ type: drawMode, color: activeColor, points: [{ x: c.x, y: c.y }] });
        updateMagnifier(c);
      };

      const handleMove = (e) => {
        const c = getCoords(e);
        if (isPanning) {
          setPan(p => ({ x: p.x + (c.cx - lastPoint.x)/zoom, y: p.y + (c.cy - lastPoint.y)/zoom }));
          setLastPoint({ x: c.cx, y: c.cy }); return;
        }
        if (drawMode === 'vector' && vectorAnchor && isDrawing) {
          if (e.touches) e.preventDefault();
          const snapped = snapVectorPoint(vectorAnchor, { x: c.x, y: c.y });
          setCurrentPath({ type: 'vector', color: activeColor, points: [vectorAnchor, snapped] });
          updateMagnifier(c);
          return;
        }
        if (!isDrawing) return;
        setCurrentPath(p => {
          if (drawMode === 'line') return { ...p, points: [p.points[0], { x: c.x, y: c.y }] };
          return { ...p, points: [...p.points, { x: c.x, y: c.y }] };
        });
        updateMagnifier(c);
      };

      const handleEnd = () => {
        if (drawMode === 'vector') {
          if (isDrawing && currentPath && currentPath.points.length > 1) {
            const [a, b] = currentPath.points;
            if (Math.hypot(b.x - a.x, b.y - a.y) > 1) {
              setPaths(prev => [...prev, currentPath]);
            }
            setVectorAnchor(null);
            setCurrentPath(null);
            setIsDrawing(false);
          }
          setIsPanning(false);
          setMag(m => ({ ...m, show: false }));
          return;
        }
        if (isDrawing && currentPath) setPaths(prev => [...prev, currentPath]);
        setIsDrawing(false); setIsPanning(false); setCurrentPath(null); setMag(m => ({ ...m, show: false }));
      };

      useEffect(() => {
        if (!isFullscreen) return;
        const onKeyDown = (ev) => {
          const tag = (ev.target?.tagName || "").toLowerCase();
          if (tag === "input" || tag === "textarea" || tag === "select") return;

          const key = (ev.key || "").toLowerCase();
          if ((ev.ctrlKey || ev.metaKey) && key === "z") {
            ev.preventDefault();
            if (vectorAnchor) {
              setVectorAnchor(null);
              setCurrentPath(null);
              setIsDrawing(false);
              return;
            }
            setPaths((prev) => prev.slice(0, -1));
            return;
          }
          if (key === "c") {
            ev.preventDefault();
            cycleActiveColor(ev.shiftKey ? -1 : 1);
          }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [isFullscreen, vectorAnchor, cycleActiveColor]);

      useEffect(() => {
        if (drawMode !== "vector" && vectorAnchor) {
          setVectorAnchor(null);
          setCurrentPath(null);
          setIsDrawing(false);
          setMag(m => ({ ...m, show: false }));
        }
      }, [drawMode, vectorAnchor]);

      const vectorDraftInfo = useMemo(() => {
        if (!currentPath || currentPath.type !== "vector" || currentPath.points.length < 2) return null;
        const [start, end] = currentPath.points;
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const distance = Math.hypot(dx, dy);
        if (!distance) return null;
        const angle = Math.atan2(dy, dx) * (180 / Math.PI);
        const angleNorm = ((angle % 360) + 360) % 360;
        return { distance: Math.round(distance), angle: angleNorm.toFixed(1) };
      }, [currentPath]);

      useEffect(() => {
        if (!mag.show) return;
        const sourceCanvas = canvasRef.current;
        const lensCanvas = magnifierCanvasRef.current;
        if (!sourceCanvas || !lensCanvas) return;
        const ctx = lensCanvas.getContext("2d");
        if (!ctx) return;

        const srcSize = MAG_SIZE / MAG_ZOOM;
        const sx = Math.max(0, Math.min(sourceCanvas.width - srcSize, mag.sx - srcSize / 2));
        const sy = Math.max(0, Math.min(sourceCanvas.height - srcSize, mag.sy - srcSize / 2));

        ctx.clearRect(0, 0, MAG_SIZE, MAG_SIZE);
        ctx.save();
        ctx.beginPath();
        ctx.arc(MAG_SIZE / 2, MAG_SIZE / 2, MAG_SIZE / 2 - 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(sourceCanvas, sx, sy, srcSize, srcSize, 0, 0, MAG_SIZE, MAG_SIZE);
        ctx.restore();

        ctx.strokeStyle = "rgba(99,102,241,0.95)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(MAG_SIZE / 2, 10);
        ctx.lineTo(MAG_SIZE / 2, MAG_SIZE - 10);
        ctx.moveTo(10, MAG_SIZE / 2);
        ctx.lineTo(MAG_SIZE - 10, MAG_SIZE / 2);
        ctx.stroke();
      }, [mag, currentPath, paths, drawMode]);

      // --- LOGICA DE IMPRESSÃƒO E WHATSAPP ---
      const handlePrint = async () => {
        if (isProcessing || isPrinting) return;
        setIsPrinting(true);
        const originalTitle = document.title;
        const wasDark = document.body.classList.contains("dark");
        if (wasDark) document.body.classList.remove("dark");
        document.title = `Relatório_Calçadas_${reportIdentifier.replace(/\//g, "-")}_${reportData.local.replace(/[^a-zA-Z0-9]/g, "_")}`;
        try {
          await waitForImagesReady(reportRef.current);
          await new Promise((r) => setTimeout(r, 200));
          window.print();
        } finally {
          setTimeout(() => { 
            document.title = originalTitle;
            if (wasDark) document.body.classList.add("dark");
            setIsPrinting(false);
          }, 500);
        }
      };

      const saveMyMapsHistory = (entry) => {
        try {
          const raw = localStorage.getItem(MYMAPS_HISTORY_KEY);
          const list = raw ? JSON.parse(raw) : [];
          list.unshift(entry);
          localStorage.setItem(MYMAPS_HISTORY_KEY, JSON.stringify(list));
        } catch (err) {}
      };

      const handleCopyToMyMaps = () => {
        const assunto = `Relatório Calçada ${reportIdentifier}`.trim();
        const categoria = "Calçada";
        const processo = processNumber;
        const local = reportData.local || "";
        const data = formatDateIso(reportData.dataIso || "");
        const coords = "";
        const dataRow = `${assunto}\t${categoria}\t${processo}\t${local}\t${data}\t${coords}`;

        const historyEntry = {
          id: (crypto?.randomUUID?.() || Math.random().toString(36).slice(2)),
          assunto,
          categoria,
          numeroProcesso: processo,
          local,
          data: reportData.dataIso || "",
          coordenadas: coords,
        };
        saveMyMapsHistory(historyEntry);

        const textArea = document.createElement("textarea");
        textArea.value = dataRow;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand("copy");
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {}
        document.body.removeChild(textArea);
      };

      const generatePdfBlob = async () => {
        if (!window.html2canvas || !window.jspdf) {
          throw new Error("Bibliotecas de PDF não carregadas.");
        }
        const el = reportRef.current;
        if (!el) throw new Error("Relatório não encontrado.");
        await waitForImagesReady(el);
        const pdf = new window.jspdf.jsPDF("p", "mm", "a4");
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        const renderCanvas = (target) =>
          window.html2canvas(target, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff",
          });

        const addLongCanvas = (canvas, startOnNewPage = false) => {
          const imgData = canvas.toDataURL("image/jpeg", 0.98);
          const imgWidth = pageWidth;
          const imgHeight = (canvas.height * imgWidth) / canvas.width;
          let heightLeft = imgHeight;
          let position = 0;

          if (startOnNewPage) {
            pdf.addPage();
          }

          pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
          heightLeft -= pageHeight;

          while (heightLeft > 0) {
            position = heightLeft - imgHeight;
            pdf.addPage();
            pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;
          }
        };

        const coverEl = el.querySelector("[data-pdf-cover]");
        const bodyEl = el.querySelector("[data-pdf-body]");

        if (coverEl && bodyEl) {
          const coverCanvas = await renderCanvas(coverEl);
          const coverData = coverCanvas.toDataURL("image/jpeg", 0.98);
          pdf.addImage(coverData, "JPEG", 0, 0, pageWidth, pageHeight);

          const bodyCanvas = await renderCanvas(bodyEl);
          addLongCanvas(bodyCanvas, true);
        } else {
          const canvas = await renderCanvas(el);
          addLongCanvas(canvas, false);
        }

        return pdf.output("blob");
      };

      const handleSendWhatsApp = async () => {
        if (isProcessing || isPrinting || isSharing) return;
        setIsSharing(true);
        const wasDark = document.body.classList.contains("dark");
        if (wasDark) document.body.classList.remove("dark");
        try {
          const blob = await generatePdfBlob();
          const filename = `Relatório_Calçada_${reportIdentifier || "sem-numero"}.pdf`;
          const file = new File([blob], filename, { type: "application/pdf" });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: "Relatório de Calçada",
              text: "Envio do relatório em PDF.",
            });
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            const msg = encodeURIComponent("PDF gerado. Anexe o arquivo no WhatsApp.");
            window.open(`https://wa.me/?text=${msg}`);
          }
        } catch (err) {
          const processLine = processNumber ? `\nProcesso: ${processNumber}` : "";
          const msg = encodeURIComponent(`*VISTORIA GDF*\nRelatório: ${reportIdentifier}${processLine}\nLocal: ${reportData.local}\nÁrea Total: ${areaTotal.toFixed(2)} m2\nValor Estimado: ${valorTotal}`);
          window.open(`https://wa.me/?text=${msg}`);
        } finally {
          if (wasDark) document.body.classList.add("dark");
          setIsSharing(false);
        }
      };

      const updatePhotoLegenda = (id, legenda) =>
        setPhotos(prev => prev.map(p => (p.id === id ? { ...p, legenda } : p)));

      const removePhoto = (id) => setPhotos(prev => prev.filter(p => p.id !== id));

      const movePhoto = (index, direction) => {
        if ((direction === -1 && index === 0) || (direction === 1 && index === photos.length - 1)) return;
        const next = [...photos];
        const temp = next[index];
        next[index] = next[index + direction];
        next[index + direction] = temp;
        setPhotos(next);
      };

      const handleRemoveImagem = () => {
        setImagemArea(null);
        setDrawnImage(null);
        bgRef.current = null;
        setPaths([]);
        setCurrentPath(null);
        setVectorAnchor(null);
        setIsDrawing(false);
        setMag(m => ({ ...m, show: false }));
        setZoom(1);
        setPan({ x: 0, y: 0 });
        try { localStorage.removeItem("calcadas_img_v7"); } catch (e) {}
      };

      const photosGridClass = photosPerRow === 1 ? "grid-cols-1" : photosPerRow === 2 ? "grid-cols-2" : "grid-cols-3";

      // Ferramentas de DemarcaÃ§Ã£o
      const Toolset = () => (
        <div className="flex flex-col gap-2 w-full">
          <div className="flex gap-1 bg-slate-900 p-1.5 rounded-xl shadow-inner">
            {['line', 'freehand', 'vector', 'pan'].map(m => (
              <button key={m} onClick={() => setDrawMode(m)} className={`flex-1 py-2 rounded-lg text-[9px] font-black uppercase flex flex-col items-center justify-center gap-1 transition-all ${drawMode === m ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'text-slate-500'}`}>
                {m === 'line' ? <PenLine size={16}/> : m === 'freehand' ? <MousePointer2 size={16}/> : m === 'vector' ? <Crosshair size={16}/> : <Move size={16}/>}
                <span>{m === 'line' ? 'Reta' : m === 'freehand' ? 'Livre' : m === 'vector' ? 'Vetor' : 'Mover'}</span>
              </button>
            ))}
            <button
              onClick={() => {
                if (vectorAnchor) {
                  setVectorAnchor(null);
                  setCurrentPath(null);
                  setIsDrawing(false);
                  setMag(m => ({ ...m, show: false }));
                  return;
                }
                setPaths(paths.slice(0, -1));
              }}
              className="px-3 text-slate-300 active:text-white"
            >
              <Undo size={18}/>
            </button>
            <button onClick={() => cycleActiveColor(1)} className="px-3 bg-white/10 text-white rounded-lg border border-white/20 flex items-center gap-1" title="Trocar cor (tecla C)">
              <Palette size={16}/>
              <span className="w-3 h-3 rounded-full border border-white/60" style={{ backgroundColor: activeColor }} />
            </button>
            <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-3 bg-indigo-500 text-white rounded-lg">{isFullscreen ? <Minimize size={18}/> : <Maximize size={18}/>}</button>
            <button onClick={handleRemoveImagem} className="px-3 bg-red-500 text-white rounded-lg" title="Remover imagem">
              <Trash2 size={16}/>
            </button>
          </div>

          {drawMode === 'vector' && (
            <div className="rounded-xl border border-indigo-100 bg-indigo-50 p-2 space-y-2">
              <div className="flex gap-2 items-center justify-between">
                <span className="text-[10px] font-black text-indigo-700 uppercase">Snap angular:</span>
                <div className="flex gap-1">
                  {[0, 15, 30, 45].map(step => (
                    <button
                      key={step}
                      type="button"
                      onClick={() => setVectorSnapDeg(step)}
                      className={`px-2 py-1 rounded-md text-[10px] font-black border ${vectorSnapDeg === step ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-indigo-600 border-indigo-200'}`}
                    >

              </div>
              {vectorDraftInfo && (
                <div className="text-[10px] font-black text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-md px-2 py-1">
                  Vetor: {vectorDraftInfo.distance}px - Angulo {vectorDraftInfo.angle} deg
                </div>

            </div>
          )}

          <button
            type="button"

            className="w-full py-2 rounded-xl border border-slate-200 bg-white text-[10px] font-black uppercase text-slate-600 hover:bg-slate-50"
          >
            Configurações
          </button>
          
          <div className={`relative border-2 border-indigo-400 rounded-2xl overflow-hidden bg-slate-900 flex items-center justify-center canvas-container ${isFullscreen ? 'flex-1 h-full' : 'h-[250px] sm:h-[350px]'}`}>
            <div className="relative inline-block" style={{ transform: `scale(${zoom}) translate(${pan.x}px, ${pan.y}px)`, transition: isPanning ? 'none' : 'transform 0.15s ease-out' }}>
              <img ref={bgImgElRef} src={imagemArea} onLoad={handleBgImageLoad} className="block max-w-none select-none pointer-events-none" alt="Planta" />
              <canvas ref={canvasRef} onMouseDown={handleStart} onMouseMove={handleMove} onMouseUp={handleEnd} onMouseLeave={handleEnd} onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd} onTouchCancel={handleEnd} className="absolute inset-0 bg-transparent" />
            </div>
            <div className="absolute bottom-4 right-4 flex flex-col gap-2">
              <button onClick={() => setZoom(z => Math.min(z + 0.5, 5))} className="w-12 h-12 bg-white/10 backdrop-blur-md text-white rounded-full flex items-center justify-center border border-white/20 shadow-xl"><ZoomIn size={24}/></button>
              <button onClick={() => setZoom(z => Math.max(z - 0.5, 0.5))} className="w-12 h-12 bg-white/10 backdrop-blur-md text-white rounded-full flex items-center justify-center border border-white/20 shadow-xl"><ZoomOut size={24}/></button>
              <button onClick={() => {setZoom(1); setPan({x:0,y:0});}} className="w-12 h-12 bg-indigo-600 text-white rounded-full text-[11px] font-black shadow-lg border-2 border-white/20">1:1</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-100 app-bg flex flex-col md:flex-row p-2 sm:p-4 gap-4">
          
          {mag.show && (
            <div className="magnifier-window fixed rounded-full overflow-hidden" style={{ left: mag.x - (MAG_SIZE / 2), top: mag.y - (MAG_SIZE / 2), width: MAG_SIZE, height: MAG_SIZE }}>
              <canvas ref={magnifierCanvasRef} width={MAG_SIZE} height={MAG_SIZE} />
            </div>
          )}

          {isFullscreen && (
            <div className="fixed inset-0 z-[9998] bg-black flex flex-col p-2 no-print-area">
              <Toolset />
            </div>
          )}

          {showSettings && (
            <div className="fixed inset-0 z-[9999] bg-black/60 flex items-center justify-center p-4 no-print-area">
              <div className="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-4 shadow-xl">
                <div className="flex items-center justify-between mb-3">
                  <div className="text-[11px] font-black uppercase text-[#004587]">Configurações</div>
                  <button
                    type="button"
                    onClick={() => setShowSettings(false)}
                    className="px-2 py-1 text-[10px] font-black uppercase text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50"
                  >
                    Fechar
                  </button>
                </div>

                <div className="space-y-4">
                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                    <div className="flex items-center justify-between text-[10px] font-black uppercase text-slate-600">
                      <span>Grosura da linha</span>
                      <span>{lineWidthScale.toFixed(1)}x</span>
                    </div>
                    <input
                      type="range"
                      min="0.5"
                      max="3"
                      step="0.1"
                      value={lineWidthScale}
                      onChange={(e) => setLineWidthScale(parseFloat(e.target.value))}
                      className="w-full"
                    />
                  </div>

                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                    <div className="flex items-center justify-between text-[10px] font-black uppercase text-slate-600">
                      <span>Tamanho dos pontos</span>
                      <span>{pointSizeScale.toFixed(1)}x</span>
                    </div>
                    <input
                      type="range"
                      min="0.5"
                      max="3"
                      step="0.1"
                      value={pointSizeScale}
                      onChange={(e) => setPointSizeScale(parseFloat(e.target.value))}
                      className="w-full"
                    />
                  </div>

                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                    <div className="flex items-center justify-between text-[10px] font-black uppercase text-slate-600">
                      <span>Tamanho da planta no PDF</span>
                      <span>{plantaPdfSize} cm</span>
                    </div>
                    <input
                      type="range"
                      min="6"
                      max="16"
                      step="1"
                      value={plantaPdfSize}
                      onChange={(e) => setPlantaPdfSize(parseInt(e.target.value, 10))}
                      className="w-full"
                    />
                  </div>

                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                    <div className="flex items-center justify-between text-[10px] font-black uppercase text-slate-600">
                      <span>Largura da planta no PDF</span>
                      <span>{plantaPdfWidth} cm</span>
                    </div>
                    <input
                      type="range"
                      min="8"
                      max="19"
                      step="1"
                      value={plantaPdfWidth}
                      onChange={(e) => setPlantaPdfWidth(parseInt(e.target.value, 10))}
                      className="w-full"
                    />
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* PAINEL LATERAL */}
          <div className="w-full md:w-[450px] ui-theme shrink-0 bg-white rounded-2xl shadow-xl p-5 md:overflow-y-auto md:max-h-[95vh] border-t-8 border-[#004587] no-print-area custom-scrollbar">
            <div className="flex items-center gap-4 mb-8 border-b pb-4">
              <img src={imgBrasãoURL} onError={(e) => { if (e.currentTarget.src !== imgBrasãoURLFallback) e.currentTarget.src = imgBrasãoURLFallback; }} alt="Brasão" className="h-12" />
              <div className="flex-1">
                <h1 className="text-[10px] font-black text-[#004587] uppercase opacity-70">Administração Regional</h1>
                <h1 className="text-lg font-black text-[#004587] uppercase tracking-tighter leading-none">Vistoria de Calçadas</h1>
              </div>
              {autoSaved && <div className="text-[10px] text-emerald-500 font-bold">Salvo</div>}
            </div>

            <div className="space-y-6">
              <section className="space-y-3">
                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><FileText size={14}/> 1. Identificacao</h2>
                <div className="grid grid-cols-2 gap-2">
                  <input type="text" placeholder="Nº do Relatório" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-bold" value={reportData.numeroRelatório} onChange={e => setReportData({...reportData, numeroRelatório: e.target.value})} />
                  <input type="text" placeholder="Local" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-bold" value={reportData.local} onChange={e => setReportData({...reportData, local: e.target.value})} />
                </div>
                <input type="text" placeholder="Nº do Processo" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" value={reportData.numeroProcesso} onChange={e => setReportData({...reportData, numeroProcesso: e.target.value})} />
                <input type="text" placeholder="Telefone" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" value={reportData.telefone} onChange={e => setReportData({...reportData, telefone: e.target.value})} />
                <textarea
                  rows="3"
                  placeholder="Endereço institucional"
                  className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs resize-y"
                  value={reportData.endereco}
                  onChange={e => setReportData({...reportData, endereco: e.target.value})}
                />
                <input type="text" placeholder="Responsável" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" value={reportData.vistoriador} onChange={e => setReportData({...reportData, vistoriador: e.target.value})} />
                <div className="grid grid-cols-2 gap-2">
                  <input type="text" placeholder="Cargo/Funcao" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" value={reportData.vistoriadorCargo} onChange={e => setReportData({...reportData, vistoriadorCargo: e.target.value})} />
                  <input type="text" placeholder="Matrícula" className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" value={reportData.vistoriadorMatrícula} onChange={e => setReportData({...reportData, vistoriadorMatrícula: e.target.value})} />
                </div>
                <input type="date" className="w-full p-2.5 bg-blue-50 border border-blue-100 rounded-xl text-xs font-bold text-blue-700" value={reportData.dataIso} onChange={e => setReportData({...reportData, dataIso: e.target.value})} />
                <textarea
                  rows="2"
                  placeholder="Descrição do relatório"
                  className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs"
                  value={reportData.descricaoRelatório}
                  onChange={e => setReportData({...reportData, descricaoRelatório: e.target.value})}
                />
              </section>

              <section className="space-y-3">
                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Ruler size={14}/> 2. Medidas</h2>
                <div className="space-y-2">
                  {dimensions.map(d => (
                    <div key={d.id} className={`flex items-center gap-3 p-2 rounded-xl border transition-all ${activeColor === d.color ? 'bg-yellow-50 border-yellow-400 ring-2 ring-yellow-100' : 'bg-slate-50'}`}>
                      <button onClick={() => {setActiveColor(d.color); setDimensions(dimensions.map(dim => dim.id === d.id ? {...dim, color: COLORS[(COLORS.indexOf(dim.color)+1)%COLORS.length]} : dim))}} className="w-8 h-8 rounded-full border-4 border-white shadow-md transition-transform active:scale-90" style={{ backgroundColor: d.color }} />
                      <input type="text" className="flex-1 bg-transparent text-xs font-black font-mono outline-none" value={d.text} onChange={e => setDimensions(dimensions.map(dim => dim.id === d.id ? {...dim, text: e.target.value} : dim))} onFocus={() => setActiveColor(d.color)} />
                      <button onClick={() => setDimensions(dimensions.filter(dim => dim.id !== d.id))} className="text-red-300 p-2"><Trash2 size={16}/></button>
                    </div>
                  ))}
                  <button onClick={() => setDimensions([...dimensions, {id: generateId(), text: "", color: COLORS[dimensions.length%COLORS.length]}])} className="w-full py-3 border-2 border-dashed border-slate-200 text-slate-400 text-[10px] font-black uppercase rounded-xl hover:bg-slate-50 transition-colors">+ Adicionar Nova Medida</button>
                </div>
                <div className="grid grid-cols-2 gap-3 pt-2">
                  <div className="bg-slate-900 text-white p-3 rounded-2xl flex flex-col"><span className="text-[8px] font-bold text-slate-400 uppercase">Área Total</span><span className="text-sm font-black">{areaTotal.toFixed(2)} m2</span></div>
                  <div className="bg-indigo-50 border border-indigo-100 p-3 rounded-2xl flex flex-col"><span className="text-[8px] font-bold text-indigo-400 uppercase">Valor p/ m2</span><input type="text" className="bg-transparent text-sm font-black text-indigo-700 outline-none" value={reportData.valorMetroQuadrado} onChange={e => setReportData({...reportData, valorMetroQuadrado: e.target.value})} /></div>
                </div>
              </section>

              <section className="space-y-3">
                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><PenTool size={14}/> 3. Planta</h2>
                {!imagemArea ? (
                  <label className="flex flex-col items-center justify-center w-full h-32 border-4 border-dashed border-indigo-100 rounded-3xl cursor-pointer bg-slate-50 hover:bg-indigo-50 transition-all">
                    <Plus size={32} className="text-indigo-200 mb-2"/>
                    <span className="text-[10px] font-black text-indigo-400 uppercase">Carregar Imagem da Planta</span>
                    <input type="file" className="hidden" accept="image/*" onChange={async e => {
                      const base64 = await resizeImageToBase64(e.target.files[0]);
                      setImagemArea(base64);
                    }} />
                  </label>
                ) : (
                  isFullscreen ? (
                    <div className="rounded-2xl border border-indigo-100 bg-indigo-50 p-3 text-[10px] font-bold text-indigo-700">
                      Tela cheia ativa. As ferramentas estao na tela cheia.
                    </div>
                  ) : (
                    <Toolset />
                  )
                )}
              </section>

              <section className="space-y-3">
                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><ImageIcon size={14}/> 4. Evidências</h2>
                <textarea
                  rows="2"
                  placeholder="Descrição das imagens"
                  className="w-full p-2.5 bg-slate-50 border rounded-xl text-xs"
                  value={reportData.descricaoImagens}
                  onChange={e => setReportData({...reportData, descricaoImagens: e.target.value})}
                />
                <div className="grid grid-cols-3 gap-2">
                  {[1, 2, 3].map(num => (
                    <button
                      key={num}
                      type="button"
                      onClick={() => setPhotosPerRow(num)}
                      className={`py-2 rounded-xl border text-[9px] font-black uppercase transition-all ${
                        photosPerRow === num ? "bg-[#004587] text-white border-[#004587]" : "bg-white text-slate-500 hover:bg-slate-50"
                      }`}
                    >
                      {num} {num === 1 ? "FOTO" : "FOTOS"} / LINHA
                    </button>
                  ))}
                </div>

                <label className="flex items-center justify-center w-full h-14 border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50 cursor-pointer hover:bg-slate-100 transition-all">
                  <Plus size={18} className="text-slate-500 mr-2"/>
                  <span className="text-[10px] font-black text-slate-600 uppercase">Adicionar Evidências</span>
                  <input
                    type="file"
                    className="hidden"
                    multiple
                    accept="image/*"
                    onChange={async e => {
                      const files = Array.from(e.target.files || []);
                      e.target.value = "";
                      if (!files.length) return;
                      const newOnes = await Promise.all(files.map(async f => ({ id: generateId(), url: await resizeImageToBase64(f, 800, 0.6), legenda: "" })));
                      setPhotos(prev => [...prev, ...newOnes]);
                    }}
                  />
                </label>

                <div className="space-y-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                  {photos.map((p, index) => (
                    <div key={p.id} className="flex gap-2 p-2 bg-slate-50 rounded-xl border items-center">
                      <div className="flex flex-col gap-1 pr-2 border-r border-slate-200">
                        <button type="button" onClick={() => movePhoto(index, -1)} disabled={index === 0} className="text-slate-400 hover:text-[#004587] disabled:opacity-20"><ArrowUp size={14}/></button>
                        <button type="button" onClick={() => movePhoto(index, 1)} disabled={index === photos.length - 1} className="text-slate-400 hover:text-[#004587] disabled:opacity-20"><ArrowDown size={14}/></button>
                      </div>
                      <img src={p.url} className="w-12 h-12 object-cover rounded-lg border" alt="Evidencia" />
                      <div className="flex-1">
                        <input
                          type="text"
                          placeholder="Legenda..."
                          className="text-[10px] w-full p-1.5 border rounded bg-white"
                          value={p.legenda}
                          onChange={(e) => updatePhotoLegenda(p.id, e.target.value)}
                        />
                      </div>
                      <button type="button" onClick={() => removePhoto(p.id)} className="text-red-300 hover:text-red-600 p-1.5"><Trash2 size={14}/></button>
                    </div>
                  ))}
                </div>
              </section>

              <div className="grid grid-cols-2 gap-3 pt-6 border-t">
                <button onClick={handlePrint} className="flex-1 py-4 bg-[#004587] text-white rounded-2xl text-[11px] font-black uppercase shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all"><Printer size={18}/> Gerar PDF</button>
                <button onClick={handleSendWhatsApp} disabled={isSharing || isProcessing || isPrinting} className="flex-1 py-4 bg-emerald-500 text-white rounded-2xl text-[11px] font-black uppercase shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-60"><MessageCircle size={18}/> {isSharing ? "Gerando PDF..." : "WhatsApp"}</button>
              </div>
              <button
                type="button"
                onClick={handleCopyToMyMaps}
                className={`w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-xl mt-2 active:scale-95 border-b-4 ${
                  copied ? "bg-emerald-500 text-white border-emerald-700" : "bg-orange-500 text-white border-orange-700"
                }`}
              >
                <MapIcon size={18}/> {copied ? "Dados copiados" : "Copiar para My Maps"}
              </button>
            </div>
          </div>

          {/* PREVIEW PDF */}
          <div className="flex-1 bg-white shadow-2xl rounded-3xl border overflow-hidden hidden md:flex flex-col print:shadow-none print:border-none print:rounded-none print-flow print-overflow-visible report-light">
             <div className="bg-slate-800 p-2 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest print:hidden">Pré-visualização do Documento</div>
             <div className="flex-1 overflow-y-auto p-4 flex justify-center bg-slate-200 print:p-0 print:bg-white print-flow print-overflow-visible report-light">
                <div ref={reportRef} className="bg-white w-[700px] min-h-[990px] shadow-2xl flex flex-col print-area print-area--flow print:shadow-none print:min-h-0 print:block print:h-auto report-root report-light">
                   <div className="report-cover-page" data-pdf-cover="true">
                      <div className="report-cover-brand">
                        <img src={imgBrasãoURL} onError={(e) => { if (e.currentTarget.src !== imgBrasãoURLFallback) e.currentTarget.src = imgBrasãoURLFallback; }} className="report-cover-logo" alt="Brasão" />
                        <h1 className="report-cover-orgao">{reportData.orgao}</h1>
                        <h2 className="report-cover-adm">{reportData.admRegional}</h2>
                        <h3 className="report-cover-setor">{reportData.setor || "SETOR RESPONSAVEL"}</h3>
                      </div>

                      <div className="report-cover-main">
                        <p className="report-cover-kicker">Levantamento Tecnico</p>
                        <div className="report-cover-divider"></div>
                        <h2 className="report-cover-title">{reportData.tituloPrincipal}</h2>
                        {coverSubtitle && <p className="report-cover-subtitle">{coverSubtitle}</p>}
                      </div>

                      <div>
                        <div className="report-cover-footer">
                          <span className="report-cover-footer-line">Brasilia - DF</span>
                          <span className="report-cover-footer-line">{formatDateIso(reportData.dataIso)}</span>
                          {reportData.local.trim() && (
                            <span className="report-cover-footer-line">Local da demanda: {reportData.local}</span>
                          )}
                          {processNumber && (
                            <span className="report-cover-footer-line">Numero de processo: {processNumber}</span>
                          )}
                        </div>
                        {hasContactData && (
                          <div className={`report-cover-summary report-cover-summary--contact${isSingleContactField ? " report-cover-summary--compact" : ""}`}>
                            <div className="report-cover-summary-title">Dados de Contato</div>
                            <div className={`report-cover-grid report-cover-grid--parallel${isSingleContactField ? " report-cover-grid--single" : ""}`}>
                              <CoverField label="Telefone" value={contactPhone} />
                              <CoverField label="Endereco" value={contactAddress} />
                            </div>
                          </div>
                        )}
                      </div>
                   </div>

                  <div className="report-document-body page-content p-10 flex-1 flex flex-col" data-pdf-body="true">
                   <div className="flex-1 print:block report-body">
                      <div className="grid grid-cols-2 gap-8">
                        <div className="space-y-4">
                          <div className="border-l-4 border-[#004587] pl-4 py-1">
                             <span className="text-[8px] font-bold text-slate-400 uppercase">Localização</span>
                             <p className="text-xs font-black text-slate-800">{reportData.local}</p>
                             <p className="text-[9px] font-bold text-slate-600 mt-1">Data de criacao: {formatDateSimple(reportCreatedAt)}</p>
                          </div>
                          <div className="border-l-4 border-slate-200 pl-4 py-1">
                             <span className="text-[8px] font-bold text-slate-400 uppercase">Responsável</span>
                             <p className="text-xs font-bold text-slate-600">{reportData.vistoriador}</p>
                          </div>
                        </div>

                        <div className="space-y-6">
                          <div className="bg-white p-5 rounded-3xl border-2 border-slate-100 shadow-sm space-y-4">
                             <h4 className="text-[10px] font-black text-[#004587] uppercase tracking-wider border-b pb-2">Legenda de Medidas</h4>
                             <div className="space-y-3">
                                {dimensions.map(d => (
                                  <div key={d.id} className="flex items-center gap-3">
                                     <div className="w-4 h-4 rounded-full shadow-sm" style={{ backgroundColor: d.color }} />
                                     <span className="text-xs font-black font-mono text-slate-700">{d.text || "---"}</span>
                                  </div>
                                ))}
                             </div>
                          </div>
                        </div>
                      </div>

                      {reportData.descricaoRelatório && (
                        <div className="mt-6 bg-slate-50 border border-slate-200 rounded-2xl p-4">
                          <div className="text-[9px] font-black text-[#004587] uppercase border-b pb-2 mb-2">Descrição do Relatório</div>
                          <div className="text-[10px] font-medium text-slate-700 whitespace-pre-wrap">{reportData.descricaoRelatório}</div>
                        </div>
                      )}

                      <div className="mt-6 grid grid-cols-2 gap-4">
                         <div className="bg-yellow-50 p-4 rounded-3xl border-2 border-yellow-100 flex justify-between items-center">
                           <span className="text-[9px] font-black text-yellow-800 uppercase">Área Total</span>
                            <span className="text-lg font-black text-yellow-900">{areaTotal.toFixed(2)} m2</span>
                         </div>
                         <div className="bg-emerald-50 p-4 rounded-3xl border-2 border-emerald-100 flex justify-between items-center">
                            <span className="text-[9px] font-black text-emerald-800 uppercase">Estimativa</span>
                            <span className="text-lg font-black text-emerald-900">{valorTotal}</span>
                         </div>
                      </div>

                      <div className={`mt-6 flex justify-center avoid-break ${photos.length > 0 ? "print-break-after" : ""}`}>
                        <div
                          className="bg-slate-50 p-4 rounded-2xl border flex flex-col gap-2"
                          style={{ width: `${plantaPdfWidth}cm`, maxWidth: "100%" }}
                        >
                           <span className="text-[9px] font-black text-[#004587] uppercase border-b pb-2 mb-2">Demarcação em Planta</span>
                           {drawnImage ? (
                             <img
                               src={drawnImage}
                               className="block mx-auto rounded-lg"
                               style={{ height: `${plantaPdfSize}cm`, width: "100%", objectFit: "contain" }}
                               alt="Planta"
                             />
                           ) : (
                             <div className="h-40 bg-slate-100 rounded-lg animate-pulse" />
                           )}
                        </div>
                      </div>
                      {photos.length > 0 && (
                        <div className="mt-6 references-section print-break-before">
                          <div className="text-[9px] font-black text-[#004587] uppercase border-b pb-2 mb-3">Referências</div>
                          {reportData.descricaoImagens && (
                            <div className="text-[10px] font-medium text-slate-700 mb-3 whitespace-pre-wrap">
                              {reportData.descricaoImagens}
                            </div>
                          )}
                          <div className={`grid ${photosGridClass} gap-3 photo-grid`}>
                            {photos.map(p => (
                              <div key={p.id} className="border border-slate-200 rounded-xl p-2 bg-white avoid-break photo-card">
                                <img src={p.url} className="w-full h-auto object-cover rounded-lg mb-2" alt="Evidencia" />
                                {p.legenda && <div className="text-[8px] font-bold text-slate-600">{p.legenda}</div>}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                   </div>

                    <div className="mt-auto pt-10 flex flex-col items-center">
                      <div className="w-64 h-[2px] bg-slate-200 mb-2" />
                      <p className="text-[11px] font-black text-[#004587] uppercase tracking-widest">{reportData.vistoriador}</p>
                      {reportData.vistoriadorCargo && (
                        <p className="text-[9px] font-bold text-slate-600 uppercase tracking-wider">{reportData.vistoriadorCargo}</p>
                      )}
                      {reportData.vistoriadorMatrícula && (
                        <p className="text-[9px] font-bold text-slate-600 uppercase tracking-wider">Matrícula: {reportData.vistoriadorMatrícula}</p>
                      )}
                      <p className="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Vistoria e Levantamento Técnico</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
